<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Semantic Compiler v2</title>
<style>
  :root {
    --bg: #08090f;
    --card: #0d0f1a;
    --border: #161928;
    --A: #38bdf8;
    --B: #f59e0b;
    --C: #4ade80;
    --red: #f87171;
    --warn: #fbbf24;
    --text: #b8c4e0;
    --dim: #2e3a52;
    --mid: #566080;
    --white: #e4ecff;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --serif: Georgia, 'Times New Roman', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }
  textarea, input, button { font-family: inherit; }
  textarea { resize: none; }
  button { cursor: pointer; border: none; background: none; }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: #1e2535; }

  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* Header */
  #header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); flex-shrink: 0; gap: 10px;
  }
  #header-left { display: flex; align-items: baseline; gap: 8px; }
  #header-left .serif { font-family: var(--serif); font-size: 16px; color: var(--white); font-style: italic; }
  #header-left .ver { font-size: 9px; color: var(--dim); letter-spacing: 2px; }
  #header-right { display: flex; gap: 6px; align-items: center; }
  .hbtn {
    font-size: 8px; color: var(--dim); border: 1px solid var(--border);
    border-radius: 2px; padding: 3px 8px; letter-spacing: 1px; transition: all 0.2s;
  }
  .hbtn:hover { color: var(--mid); border-color: var(--mid); }
  .hbtn.accent { color: var(--A); border-color: color-mix(in srgb, var(--A) 30%, transparent); }
  #mode-badge {
    font-size: 8px; letter-spacing: 2px; padding: 3px 8px; border-radius: 2px;
    border: 1px solid var(--border); color: var(--dim);
    transition: all 0.3s;
  }
  #mode-badge.INTERPRET  { color: var(--text); border-color: var(--mid); }
  #mode-badge.COMPILE    { color: var(--A); border-color: color-mix(in srgb, var(--A) 40%, transparent); background: color-mix(in srgb, var(--A) 5%, transparent); }
  #mode-badge.AUDIT      { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, transparent); background: color-mix(in srgb, var(--warn) 5%, transparent); }
  #mode-badge.PATCH      { color: var(--B); border-color: color-mix(in srgb, var(--B) 40%, transparent); background: color-mix(in srgb, var(--B) 5%, transparent); }
  #mode-badge.EXECUTE    { color: var(--C); border-color: color-mix(in srgb, var(--C) 40%, transparent); background: color-mix(in srgb, var(--C) 5%, transparent); }

  /* Panels */
  #main { display: flex; flex: 1; overflow: hidden; }
  #chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  #spec-panel { width: 280px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

  /* Chat area */
  #messages { flex: 1; overflow-y: auto; padding: 14px 14px 10px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; flex-direction: column; gap: 3px; }
  .msg-label { font-size: 8px; color: var(--dim); letter-spacing: 2px; }
  .msg-body {
    font-size: 12px; line-height: 1.65; color: var(--text);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 3px; padding: 9px 11px; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-label { color: var(--A); }
  .msg.user .msg-body { border-color: color-mix(in srgb, var(--A) 15%, transparent); }
  .msg.system .msg-label { color: var(--dim); }
  .msg.cmd .msg-label { color: var(--warn); }
  .msg.cmd .msg-body { border-color: color-mix(in srgb, var(--warn) 20%, transparent); color: var(--warn); font-size: 11px; }
  .msg.error .msg-body { border-color: color-mix(in srgb, var(--red) 30%, transparent); color: var(--red); }
  .msg.thinking .msg-body { color: var(--dim); font-style: italic; }

  /* Input */
  #input-area {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
    flex-shrink: 0;
  }
  #cmd-hints { display: flex; gap: 4px; flex-wrap: wrap; }
  .cmd-chip {
    font-size: 8px; padding: 2px 7px; border-radius: 2px;
    border: 1px solid var(--border); color: var(--dim);
    cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s;
  }
  .cmd-chip:hover { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 30%, transparent); }
  #input-row { display: flex; gap: 7px; }
  #chat-input {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 3px; color: var(--white); padding: 8px 10px;
    font-size: 12px; line-height: 1.5; max-height: 100px; min-height: 36px;
    outline: none; transition: border-color 0.2s;
  }
  #chat-input:focus { border-color: var(--mid); }
  #chat-input.cmd-mode { border-color: color-mix(in srgb, var(--warn) 40%, transparent); color: var(--warn); }
  #send-btn {
    padding: 8px 14px; border-radius: 3px; font-size: 9px; letter-spacing: 1.5px;
    background: color-mix(in srgb, var(--A) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--A) 25%, transparent);
    color: var(--A); transition: all 0.2s;
  }
  #send-btn:hover { background: color-mix(in srgb, var(--A) 18%, transparent); }
  #send-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* Spec panel */
  #spec-header {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #spec-header .label { font-size: 8px; letter-spacing: 2px; color: var(--dim); }
  #spec-header .status { font-size: 8px; color: var(--dim); }
  #spec-header .status.draft { color: var(--B); }
  #spec-header .status.frozen { color: var(--C); }
  #spec-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }

  .spec-field { display: flex; flex-direction: column; gap: 3px; }
  .spec-field-label { font-size: 8px; color: var(--dim); letter-spacing: 1.5px; }
  .spec-field-val {
    font-size: 10px; color: var(--text); line-height: 1.5;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 2px; padding: 5px 7px; min-height: 22px;
    white-space: pre-wrap; word-break: break-word;
  }
  .spec-field-val.empty { color: var(--dim); font-style: italic; }
  .spec-field-val.has-val { border-color: color-mix(in srgb, var(--A) 15%, transparent); }

  .pending-section { border-top: 1px solid var(--border); padding-top: 8px; }
  .pending-item {
    font-size: 9px; color: var(--warn); background: color-mix(in srgb, var(--warn) 5%, transparent);
    border: 1px solid color-mix(in srgb, var(--warn) 15%, transparent);
    border-radius: 2px; padding: 4px 6px; margin-top: 4px;
    display: flex; flex-direction: column; gap: 1px;
  }
  .pending-item .pi-item { color: var(--text); }
  .pending-item .pi-meta { color: var(--dim); font-size: 8px; }

  .audit-section { border-top: 1px solid var(--border); padding-top: 8px; }
  .audit-verdict {
    font-size: 9px; letter-spacing: 1px; padding: 4px 8px; border-radius: 2px;
    text-align: center; margin-bottom: 6px;
  }
  .audit-verdict.APPROVED { color: var(--C); background: color-mix(in srgb, var(--C) 8%, transparent); border: 1px solid color-mix(in srgb, var(--C) 25%, transparent); }
  .audit-verdict.NEEDS_REVISION { color: var(--warn); background: color-mix(in srgb, var(--warn) 8%, transparent); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }
  .audit-verdict.BLOCKED { color: var(--red); background: color-mix(in srgb, var(--red) 8%, transparent); border: 1px solid color-mix(in srgb, var(--red) 25%, transparent); }
  .audit-issue {
    font-size: 9px; padding: 3px 6px; border-radius: 2px; margin-top: 3px;
    border-left: 2px solid var(--dim);
  }
  .audit-issue.WARN { border-left-color: var(--warn); color: var(--warn); }
  .audit-issue.BLOCK { border-left-color: var(--red); color: var(--red); }

  #spec-actions {
    padding: 8px 12px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
  }
  .spec-btn {
    font-size: 8px; letter-spacing: 1px; padding: 5px 8px; border-radius: 2px;
    border: 1px solid var(--border); color: var(--dim); text-align: center; transition: all 0.2s;
  }
  .spec-btn:hover { color: var(--mid); }
  .spec-btn.primary { color: var(--C); border-color: color-mix(in srgb, var(--C) 30%, transparent); }
  .spec-btn.primary:hover { background: color-mix(in srgb, var(--C) 8%, transparent); }
  .spec-btn-row { display: flex; gap: 5px; }
  .spec-btn-row .spec-btn { flex: 1; }

  /* Import overlay */
  #import-overlay {
    display: none; position: fixed; inset: 0; background: rgba(8,9,15,0.92);
    z-index: 100; align-items: center; justify-content: center;
  }
  #import-overlay.open { display: flex; }
  #import-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; padding: 20px; width: 480px; max-width: 90vw;
    display: flex; flex-direction: column; gap: 12px;
  }
  #import-box .title { font-size: 10px; color: var(--white); letter-spacing: 2px; }
  #import-box .subtitle { font-size: 9px; color: var(--dim); }
  #import-textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); padding: 8px; font-size: 10px; height: 160px;
    outline: none; font-family: var(--mono); resize: none;
  }
  #import-textarea:focus { border-color: var(--mid); }
  #import-error { font-size: 9px; color: var(--red); display: none; }
  .import-btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .imp-btn {
    font-size: 8px; letter-spacing: 1px; padding: 5px 12px; border-radius: 2px;
    border: 1px solid var(--border); color: var(--dim); transition: all 0.2s;
  }
  .imp-btn:hover { color: var(--mid); }
  .imp-btn.ok { color: var(--A); border-color: color-mix(in srgb, var(--A) 30%, transparent); }

  /* Warn banner */
  #warn-banner {
    display: none; padding: 6px 14px; font-size: 9px;
    background: color-mix(in srgb, var(--warn) 8%, transparent);
    border-bottom: 1px solid color-mix(in srgb, var(--warn) 20%, transparent);
    color: var(--warn); letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <span class="serif">Semantic Compiler</span>
      <span class="ver">v2.0</span>
    </div>
    <div id="header-right">
      <span id="mode-badge" class="INTERPRET">INTERPRET</span>
      <button class="hbtn" onclick="openImport()">載入 JSON</button>
      <button class="hbtn" onclick="resetAll()">重置</button>
    </div>
  </div>

  <!-- Version warning banner -->
  <div id="warn-banner" id="warn-banner"></div>

  <div id="main">
    <!-- Chat panel -->
    <div id="chat-panel">
      <div id="messages"></div>
      <div id="input-area">
        <div id="cmd-hints">
          <span class="cmd-chip" onclick="insertCmd('！彙整')">！彙整</span>
          <span class="cmd-chip" onclick="insertCmd('！審核')">！審核</span>
          <span class="cmd-chip" onclick="insertCmd('！未完成清單')">！未完成清單</span>
          <span class="cmd-chip" onclick="insertCmd('！改檔')">！改檔</span>
          <span class="cmd-chip" onclick="insertCmd('！生成')">！生成</span>
        </div>
        <div id="input-row">
          <textarea id="chat-input" rows="1" placeholder="描述你的需求，或使用 ！指令…" onkeydown="handleKey(event)" oninput="handleInput(this)"></textarea>
          <button id="send-btn" onclick="send()">送出</button>
        </div>
      </div>
    </div>

    <!-- Spec panel -->
    <div id="spec-panel">
      <div id="spec-header">
        <span class="label">SPEC</span>
        <span class="status" id="spec-status">—</span>
      </div>
      <div id="spec-body">
        <!-- rendered by renderSpec() -->
      </div>
      <div id="spec-actions">
        <div class="spec-btn-row">
          <button class="spec-btn" onclick="copySpec('raw')">COPY RAW</button>
          <button class="spec-btn" onclick="copySpec('wrapped')">COPY WRAPPED</button>
        </div>
        <button class="spec-btn primary" onclick="exportJSON()">EXPORT JSON</button>
      </div>
    </div>
  </div>
</div>

<!-- Import overlay -->
<div id="import-overlay">
  <div id="import-box">
    <div class="title">載入 SPEC JSON</div>
    <div class="subtitle">貼上 JSON 內容，或拖曳 .json 檔案到此視窗</div>
    <textarea id="import-textarea" placeholder='{"meta": {...}, "spec": {...}, ...}'></textarea>
    <div id="import-error"></div>
    <div class="import-btn-row">
      <button class="imp-btn" onclick="closeImport()">取消</button>
      <button class="imp-btn ok" onclick="confirmImport()">載入</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_ENDPOINT = 'https://api.anthropic.com/v1/messages';
const API_KEY      = '';   // 'sk-ant-...' 或留空（由外部 proxy 提供）
const MODEL        = 'claude-sonnet-4-20250514';
const COMPILER_VERSION = '2.0';
// ─────────────────────────────────────────────────────────────────────────────

// ── Schema helpers ────────────────────────────────────────────────────────────
function emptySpec() {
  return {
    meta: {
      compiler_version: COMPILER_VERSION,
      topic: '',
      type: '',
      tags: [],
      created: new Date().toISOString(),
      updated: new Date().toISOString(),
      status: 'draft'
    },
    spec: {
      goal: '',
      task_type: '',
      target_object: '',
      constraints: [],
      must_have: [],
      must_not_have: [],
      tone_or_style: '',
      assumptions: []
    },
    pending: {
      unverified: [],
      todo: []
    },
    audit: {
      verdict: 'UNREVIEWED',
      issues: [],
      confidence: 0
    },
    history: []
  };
}

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  mode: 'INTERPRET',
  spec: emptySpec(),
  messages: [],          // {role, content} for API
  chatLog: [],           // {type, label, text} for display
};

// ── Modes + System Prompts ────────────────────────────────────────────────────
// This block is the "AI-readable" section of the compiler.
// Each mode has strict rules embedded in the prompt.

const SCHEMA_SUMMARY = `
JSON SCHEMA (唯一真實來源):
spec.goal / spec.task_type / spec.target_object / spec.constraints[] /
spec.must_have[] / spec.must_not_have[] / spec.tone_or_style / spec.assumptions[]
pending.unverified[]: {item, reason, confidence, source:"user|inferred"}
pending.todo[]: string[]
audit: {verdict:"APPROVED|NEEDS_REVISION|BLOCKED|UNREVIEWED", issues:[{field,severity:"WARN|BLOCK",message}], confidence}
meta: {compiler_version, topic, type, tags[], status:"draft|frozen"}
`.trim();

const MODES = {
  INTERPRET: `你是 Semantic Compiler v${COMPILER_VERSION} 的 INTERPRET 模式。
規則：
- 用中文與使用者自然對話，理解需求
- 不輸出 JSON，不做決策
- 可提出假設但標註「尚未確認」
- 引導使用者說清楚 goal、constraints、must_have、must_not_have
- 若使用者輸入 ！指令，說明該指令的功能並等待確認
${SCHEMA_SUMMARY}`,

  COMPILE: `你是 Semantic Compiler v${COMPILER_VERSION} 的 COMPILE 模式。
任務：將本次對話整理成結構化 JSON patch。
規則：
- 明確出現在對話中的內容 → 寫入 spec 對應欄位
- 不確定或推斷的內容 → 寫入 pending.unverified（附 reason + confidence）
- 禁止新增對話中未出現的需求
- 禁止修改 source="user" + locked=true 的欄位
- 必須輸出完整 JSON（不是 patch，是完整更新後的 spec JSON）
- 輸出格式：先輸出「COMPILE_START」，再輸出完整 JSON，最後輸出「COMPILE_END」
- JSON 外不要有其他文字
${SCHEMA_SUMMARY}`,

  AUDIT: `你是 Semantic Compiler v${COMPILER_VERSION} 的 AUDIT 模式。
任務：找出 spec 的問題。預設假設 spec 是錯的。
規則：
- 不修改 JSON，只輸出審核結果
- 主動尋找：缺失欄位、內部矛盾、目標不清、must_have 與 constraints 衝突
- 不允許輸出「沒有問題」除非真的沒有任何疑慮
- 對每個問題輸出：ISSUE: <field> | <WARN 或 BLOCK> | <描述>
- 最後輸出：VERDICT: APPROVED 或 NEEDS_REVISION 或 BLOCKED
- 輸出：CONFIDENCE: 0.0~1.0
- 之後輸出完整 audit JSON block：AUDIT_START ... AUDIT_END
${SCHEMA_SUMMARY}`,

  PATCH: `你是 Semantic Compiler v${COMPILER_VERSION} 的 PATCH 模式。
任務：依照 audit.issues 和 pending.todo 修改 spec。
規則：
- 只能修改 audit.issues 指出的欄位 和 pending.todo 的項目
- 不覆蓋 source="user" + locked=true 的欄位（列出衝突，不強改）
- 每個修改必須輸出 diff：{field, before, after, reason}
- 輸出完整更新後的 JSON，格式：PATCH_START ... PATCH_END
- PATCH_END 後輸出 diff 列表：DIFF_START ... DIFF_END
${SCHEMA_SUMMARY}`,

  EXECUTE: `你是 Semantic Compiler v${COMPILER_VERSION} 的 EXECUTE 模式。
任務：依照 frozen spec 執行並產出結果。
規則：
- 只讀 spec 欄位，禁止讀 pending
- 禁止自行擴展需求
- 禁止重新詮釋 goal
- 輸出結果後，可選附上「優化建議」區塊（清楚分隔）
- 若 audit.verdict 不是 APPROVED，先輸出警告再繼續
${SCHEMA_SUMMARY}`
};

// ── API ───────────────────────────────────────────────────────────────────────
async function callAI(userMsg, modeOverride) {
  const mode = modeOverride || state.mode;
  const systemPrompt = MODES[mode];

  // Build messages: inject current spec as context
  const specContext = `\n\n[目前 SPEC JSON]\n${JSON.stringify(state.spec, null, 2)}`;
  const msgs = [
    ...state.messages,
    { role: 'user', content: userMsg + specContext }
  ];

  const headers = { 'Content-Type': 'application/json' };
  if (API_KEY) {
    headers['x-api-key'] = API_KEY;
    headers['anthropic-version'] = '2023-06-01';
    headers['anthropic-dangerous-direct-browser-access'] = 'true';
  }

  const res = await fetch(API_ENDPOINT, {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 2000,
      system: systemPrompt,
      messages: msgs
    })
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error?.message || `API error ${res.status}`);
  return d.content.filter(b => b.type === 'text').map(b => b.text).join('');
}

// ── Parsers ───────────────────────────────────────────────────────────────────
function parseKeyValue(block) {
  const o = {};
  let lastKey = null;
  block.trim().split('\n').forEach(l => {
    const idx = l.indexOf(':');
    const possibleKey = l.slice(0, idx).trim();
    if (idx > 0 && possibleKey && !/\s/.test(possibleKey)) {
      lastKey = possibleKey;
      o[lastKey] = l.slice(idx + 1).trim();
    } else if (lastKey && l.trim()) {
      o[lastKey] += ' ' + l.trim();
    }
  });
  return Object.keys(o).length ? o : null;
}

function extractJSON(text, startTag, endTag) {
  const m = text.match(new RegExp(startTag + '([\\s\\S]*?)' + endTag));
  if (!m) return null;
  try {
    return JSON.parse(m[1].trim());
  } catch {
    // Try to repair common issues
    try {
      const cleaned = m[1].trim().replace(/,\s*([}\]])/g, '$1');
      return JSON.parse(cleaned);
    } catch {
      return null;
    }
  }
}

function extractAudit(text) {
  // Try JSON block first
  const jsonBlock = extractJSON(text, 'AUDIT_START', 'AUDIT_END');
  if (jsonBlock) return jsonBlock;

  // Fallback: parse text format
  const issues = [];
  const re = /ISSUE:\s*([^|]+)\|([^|]+)\|(.+)/g;
  let m;
  while ((m = re.exec(text))) {
    issues.push({ field: m[1].trim(), severity: m[2].trim(), message: m[3].trim() });
  }
  const vm = text.match(/VERDICT:\s*(APPROVED|NEEDS_REVISION|BLOCKED)/);
  const cm = text.match(/CONFIDENCE:\s*([\d.]+)/);
  return {
    verdict: vm?.[1] || 'NEEDS_REVISION',
    issues,
    confidence: cm ? parseFloat(cm[1]) : 0.5
  };
}

// ── Commands ──────────────────────────────────────────────────────────────────
const COMMANDS = {
  '！彙整': cmdCompile,
  '！審核': cmdAudit,
  '！未完成清單': cmdTodoList,
  '！改檔': cmdPatch,
  '！生成': cmdExecute,
};

async function cmdCompile() {
  setMode('COMPILE');
  addMsg('cmd', 'COMPILE', '切換 → COMPILE 模式\n整理本次對話內容寫入 spec…');
  addThinking();
  try {
    const resp = await callAI('請執行 ！彙整：掃描本次對話，整理成完整 spec JSON。', 'COMPILE');
    removeThinking();
    const parsed = extractJSON(resp, 'COMPILE_START', 'COMPILE_END');
    if (parsed) {
      // Merge into state.spec
      mergeSpec(parsed);
      addMsg('system', 'COMPILE', '✓ Spec 已更新。確認右側面板內容。');
      pushHistory('summarize', '！彙整');
    } else {
      addMsg('system', 'COMPILE', resp);
      addMsg('error', 'WARN', '無法解析 JSON block，請確認 AI 有輸出 COMPILE_START/END');
    }
  } catch(e) {
    removeThinking();
    addMsg('error', 'ERROR', e.message);
  }
  setMode('INTERPRET');
  renderSpec();
}

async function cmdAudit() {
  setMode('AUDIT');
  addMsg('cmd', 'AUDIT', '切換 → AUDIT 模式\n以懷疑視角審查 spec…');
  addThinking();
  try {
    const resp = await callAI('請執行 ！審核：仔細檢查目前 spec 的所有問題。', 'AUDIT');
    removeThinking();
    const auditResult = extractAudit(resp);
    state.spec.audit = auditResult;
    state.spec.meta.updated = new Date().toISOString();

    // Show readable audit
    const lines = [`VERDICT: ${auditResult.verdict}`, `CONFIDENCE: ${auditResult.confidence}`];
    if (auditResult.issues.length) {
      lines.push('');
      auditResult.issues.forEach(i => lines.push(`[${i.severity}] ${i.field}: ${i.message}`));
    }
    addMsg('system', 'AUDIT', lines.join('\n'));
    pushHistory('audit', `VERDICT: ${auditResult.verdict}`);
  } catch(e) {
    removeThinking();
    addMsg('error', 'ERROR', e.message);
  }
  setMode('INTERPRET');
  renderSpec();
}

async function cmdTodoList() {
  addMsg('cmd', 'TODO', '！未完成清單');
  const lines = [];

  if (state.spec.pending.todo.length) {
    lines.push('── TODO ─────────────────');
    state.spec.pending.todo.forEach((t, i) => lines.push(`${i+1}. ${t}`));
  }
  if (state.spec.pending.unverified.length) {
    lines.push('── 待驗證 ───────────────');
    state.spec.pending.unverified.forEach((u, i) =>
      lines.push(`${i+1}. ${u.item}  [confidence: ${u.confidence}]`));
  }
  if (state.spec.audit.issues.length) {
    lines.push('── Audit Issues ─────────');
    state.spec.audit.issues.forEach(i => lines.push(`[${i.severity}] ${i.field}: ${i.message}`));
  }
  // Check missing spec fields
  const missing = [];
  const specFields = ['goal','task_type','target_object','tone_or_style'];
  specFields.forEach(f => { if (!state.spec.spec[f]) missing.push(f); });
  const arrFields = ['constraints','must_have','must_not_have','assumptions'];
  arrFields.forEach(f => { if (!state.spec.spec[f]?.length) missing.push(f + ' (空)'); });
  if (missing.length) {
    lines.push('── 缺失欄位 ─────────────');
    missing.forEach(f => lines.push(`• ${f}`));
  }
  if (!lines.length) lines.push('目前無未完成項目。');
  addMsg('system', 'TODO', lines.join('\n'));
}

async function cmdPatch() {
  if (state.spec.audit.verdict === 'UNREVIEWED') {
    addMsg('error', 'PATCH', '請先執行 ！審核 再改檔。');
    return;
  }
  setMode('PATCH');
  addMsg('cmd', 'PATCH', '切換 → PATCH 模式\n依照 audit issues 和 todo 修改 spec…');
  addThinking();
  try {
    const resp = await callAI('請執行 ！改檔：依照 audit.issues 和 pending.todo 修改 spec。', 'PATCH');
    removeThinking();
    const parsed = extractJSON(resp, 'PATCH_START', 'PATCH_END');
    const diffs = extractJSON(resp, 'DIFF_START', 'DIFF_END');
    if (parsed) {
      mergeSpec(parsed);
      // Show diff
      if (diffs && Array.isArray(diffs)) {
        const diffLines = diffs.map(d => `${d.field}: "${d.before}" → "${d.after}"\n  reason: ${d.reason}`);
        addMsg('system', 'PATCH', '✓ Spec 已更新\n\n' + diffLines.join('\n\n'));
      } else {
        addMsg('system', 'PATCH', '✓ Spec 已更新');
      }
      pushHistory('revise', '！改檔');
    } else {
      addMsg('system', 'PATCH', resp);
      addMsg('error', 'WARN', '無法解析 PATCH JSON block');
    }
  } catch(e) {
    removeThinking();
    addMsg('error', 'ERROR', e.message);
  }
  setMode('INTERPRET');
  renderSpec();
}

async function cmdExecute() {
  if (state.spec.audit.verdict !== 'APPROVED' && state.spec.audit.verdict !== 'UNREVIEWED') {
    addMsg('error', 'EXECUTE', `⚠ audit.verdict = ${state.spec.audit.verdict}，建議先審核通過再生成。繼續？（重送 ！生成 確認）`);
    // Allow second attempt to force through
    state._executeWarned = true;
    return;
  }
  setMode('EXECUTE');
  addMsg('cmd', 'EXECUTE', '切換 → EXECUTE 模式\n依照 frozen spec 執行…');

  // Freeze spec on execute
  state.spec.meta.status = 'frozen';
  state.spec.meta.updated = new Date().toISOString();
  pushHistory('generate', '！生成');

  addThinking();
  try {
    const resp = await callAI('請執行 ！生成：依照 spec 完整執行任務。', 'EXECUTE');
    removeThinking();
    addMsg('system', 'EXECUTE', resp);
  } catch(e) {
    removeThinking();
    addMsg('error', 'ERROR', e.message);
  }
  setMode('INTERPRET');
  renderSpec();
}

// ── Spec merge ────────────────────────────────────────────────────────────────
function mergeSpec(incoming) {
  // Deep merge, respecting locked fields
  if (incoming.spec) {
    Object.keys(incoming.spec).forEach(k => {
      const val = incoming.spec[k];
      if (val !== undefined && val !== null && val !== '') {
        state.spec.spec[k] = val;
      }
    });
  }
  if (incoming.pending) {
    if (incoming.pending.unverified?.length) {
      state.spec.pending.unverified = incoming.pending.unverified;
    }
    if (incoming.pending.todo?.length) {
      state.spec.pending.todo = incoming.pending.todo;
    }
  }
  if (incoming.audit && incoming.audit.verdict !== 'UNREVIEWED') {
    state.spec.audit = incoming.audit;
  }
  if (incoming.meta) {
    ['topic','type','tags','status'].forEach(k => {
      if (incoming.meta[k]) state.spec.meta[k] = incoming.meta[k];
    });
  }
  state.spec.meta.updated = new Date().toISOString();
}

function pushHistory(action, detail) {
  state.spec.history.push({
    action,
    timestamp: new Date().toISOString(),
    changes: [detail]
  });
}

// ── Chat & Messaging ──────────────────────────────────────────────────────────
async function send() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '';
  input.classList.remove('cmd-mode');

  // Check for commands
  if (COMMANDS[text]) {
    state._executeWarned = false;
    addMsg('user', 'YOU', text);
    await COMMANDS[text]();
    return;
  }
  // Second-time execute force
  if (text === '！生成' && state._executeWarned) {
    state._executeWarned = false;
    addMsg('user', 'YOU', text + ' (確認強制執行)');
    state.spec.audit.verdict = 'APPROVED'; // override for forced execute
    await cmdExecute();
    return;
  }

  addMsg('user', 'YOU', text);
  state.messages.push({ role: 'user', content: text });
  addThinking();
  document.getElementById('send-btn').disabled = true;

  try {
    const resp = await callAI(text);
    removeThinking();
    addMsg('system', 'AI', resp);
    state.messages.push({ role: 'assistant', content: resp });
  } catch(e) {
    removeThinking();
    addMsg('error', 'ERROR', e.message);
  }
  document.getElementById('send-btn').disabled = false;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function addMsg(type, label, text) {
  const log = { type, label, text };
  state.chatLog.push(log);
  renderMsg(log);
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function renderMsg(log) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${log.type}`;
  div.innerHTML = `<div class="msg-label">${log.label}</div><div class="msg-body">${escHtml(log.text)}</div>`;
  msgs.appendChild(div);
}

function addThinking() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg thinking';
  div.id = 'thinking-indicator';
  div.innerHTML = `<div class="msg-label">AI</div><div class="msg-body">思考中…</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeThinking() {
  document.getElementById('thinking-indicator')?.remove();
}

function setMode(mode) {
  state.mode = mode;
  const badge = document.getElementById('mode-badge');
  badge.textContent = mode;
  badge.className = mode;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function handleInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  const isCmd = el.value.startsWith('！');
  el.classList.toggle('cmd-mode', isCmd);
}

function insertCmd(cmd) {
  const input = document.getElementById('chat-input');
  input.value = cmd;
  input.classList.add('cmd-mode');
  input.focus();
}

// ── Spec panel render ─────────────────────────────────────────────────────────
function renderSpec() {
  const body = document.getElementById('spec-body');
  body.innerHTML = '';

  const s = state.spec;
  const statusEl = document.getElementById('spec-status');
  statusEl.textContent = s.meta.status.toUpperCase();
  statusEl.className = `status ${s.meta.status}`;

  // Meta
  if (s.meta.topic || s.meta.type) {
    addSpecField(body, 'TOPIC', s.meta.topic || '—');
    addSpecField(body, 'TYPE', s.meta.type || '—');
    if (s.meta.tags?.length) addSpecField(body, 'TAGS', s.meta.tags.join(', '));
  }

  // Spec fields
  const specDefs = [
    ['GOAL', 'goal'], ['TASK TYPE', 'task_type'], ['TARGET', 'target_object'],
    ['CONSTRAINTS', 'constraints'], ['MUST HAVE', 'must_have'],
    ['MUST NOT HAVE', 'must_not_have'], ['TONE', 'tone_or_style'], ['ASSUMPTIONS', 'assumptions']
  ];
  specDefs.forEach(([label, key]) => {
    const val = s.spec[key];
    const display = Array.isArray(val) ? (val.length ? val.join('\n• ').replace(/^/, '• ') : '') : (val || '');
    addSpecField(body, label, display);
  });

  // Pending
  if (s.pending.unverified?.length || s.pending.todo?.length) {
    const sec = document.createElement('div');
    sec.className = 'pending-section';
    const lbl = document.createElement('div');
    lbl.className = 'spec-field-label';
    lbl.textContent = 'PENDING';
    sec.appendChild(lbl);
    s.pending.unverified.forEach(u => {
      const item = document.createElement('div');
      item.className = 'pending-item';
      item.innerHTML = `<div class="pi-item">${escHtml(u.item)}</div><div class="pi-meta">conf: ${u.confidence} · ${u.source}</div>`;
      sec.appendChild(item);
    });
    s.pending.todo.forEach(t => {
      const item = document.createElement('div');
      item.className = 'pending-item';
      item.innerHTML = `<div class="pi-item">TODO: ${escHtml(t)}</div>`;
      sec.appendChild(item);
    });
    body.appendChild(sec);
  }

  // Audit
  if (s.audit.verdict !== 'UNREVIEWED') {
    const sec = document.createElement('div');
    sec.className = 'audit-section';
    const v = document.createElement('div');
    v.className = `audit-verdict ${s.audit.verdict}`;
    v.textContent = s.audit.verdict;
    sec.appendChild(v);
    s.audit.issues?.forEach(i => {
      const issue = document.createElement('div');
      issue.className = `audit-issue ${i.severity}`;
      issue.textContent = `[${i.severity}] ${i.field}: ${i.message}`;
      sec.appendChild(issue);
    });
    body.appendChild(sec);
  }
}

function addSpecField(parent, label, value) {
  const div = document.createElement('div');
  div.className = 'spec-field';
  const hasVal = value && value.trim();
  div.innerHTML = `
    <div class="spec-field-label">${label}</div>
    <div class="spec-field-val ${hasVal ? 'has-val' : 'empty'}">${hasVal ? escHtml(value) : '—'}</div>
  `;
  parent.appendChild(div);
}

// ── Import / Export ───────────────────────────────────────────────────────────
function openImport() {
  document.getElementById('import-overlay').classList.add('open');
}

function closeImport() {
  document.getElementById('import-overlay').classList.remove('open');
  document.getElementById('import-error').style.display = 'none';
  document.getElementById('import-textarea').value = '';
}

function confirmImport() {
  const raw = document.getElementById('import-textarea').value.trim();
  const errEl = document.getElementById('import-error');
  try {
    const parsed = JSON.parse(raw);
    checkVersion(parsed);
    state.spec = { ...emptySpec(), ...parsed };
    // Ensure all required keys exist
    if (!state.spec.pending) state.spec.pending = { unverified: [], todo: [] };
    if (!state.spec.audit) state.spec.audit = { verdict: 'UNREVIEWED', issues: [], confidence: 0 };
    if (!state.spec.history) state.spec.history = [];
    closeImport();
    renderSpec();
    addMsg('system', 'IMPORT', `✓ 載入成功：${parsed.meta?.topic || '（無主題）'} · v${parsed.meta?.compiler_version || '?'}`);
  } catch(e) {
    errEl.textContent = '解析失敗：' + e.message;
    errEl.style.display = 'block';
  }
}

function checkVersion(parsed) {
  const incomingVer = parsed.meta?.compiler_version;
  if (!incomingVer) return;
  const [maj] = String(COMPILER_VERSION).split('.').map(Number);
  const [inMaj] = String(incomingVer).split('.').map(Number);
  if (inMaj < maj) {
    showBanner(`⚠ 載入的 JSON 版本 v${incomingVer} 低於目前 v${COMPILER_VERSION}，已自動升級 schema。`);
    parsed.meta.compiler_version = COMPILER_VERSION;
  } else if (inMaj > maj) {
    showBanner(`⚠ 載入的 JSON 版本 v${incomingVer} 高於本工具 v${COMPILER_VERSION}，部分欄位可能無法正確顯示。`);
  }
}

function showBanner(msg) {
  const b = document.getElementById('warn-banner');
  b.textContent = msg;
  b.style.display = 'block';
  setTimeout(() => { b.style.display = 'none'; }, 8000);
}

function exportJSON() {
  state.spec.meta.updated = new Date().toISOString();
  const json = JSON.stringify(state.spec, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const topic = state.spec.meta.topic || 'spec';
  const slug = topic.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '-').slice(0, 30);
  a.href = url;
  a.download = `${slug}-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  addMsg('system', 'EXPORT', `✓ 已匯出：${a.download}`);
}

function buildWrappedSpec() {
  const s = state.spec.spec;
  const lines = Object.entries(s).map(([k, v]) => {
    const val = Array.isArray(v) ? v.join(', ') : v;
    return val ? `${k}: ${val}` : null;
  }).filter(Boolean).join('\n');
  const auditNote = state.spec.audit.verdict !== 'APPROVED'
    ? `# ⚠ audit: ${state.spec.audit.verdict}\n` : '';
  return `${auditNote}[TASK SPEC — executor-ready]\n---\n${lines}\n---\nExecute the above spec exactly. Do not include this header in output.`;
}

function copySpec(mode) {
  const text = mode === 'wrapped'
    ? buildWrappedSpec()
    : JSON.stringify(state.spec.spec, null, 2);
  navigator.clipboard?.writeText(text) || fallbackCopy(text);
  addMsg('system', 'COPY', `✓ 已複製 ${mode === 'wrapped' ? 'wrapped' : 'raw'} spec`);
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta);
  ta.select(); document.execCommand('copy');
  document.body.removeChild(ta);
}

// ── Drag & drop JSON ──────────────────────────────────────────────────────────
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.json')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('import-textarea').value = ev.target.result;
    openImport();
  };
  reader.readAsText(file);
});

function resetAll() {
  if (!confirm('確定重置？所有對話與 spec 將清空。')) return;
  state = { mode: 'INTERPRET', spec: emptySpec(), messages: [], chatLog: [] };
  document.getElementById('messages').innerHTML = '';
  setMode('INTERPRET');
  renderSpec();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderSpec();
addMsg('system', 'SYSTEM',
  `Semantic Compiler v${COMPILER_VERSION} 已就緒。\n\n` +
  `使用方式：\n` +
  `• 直接描述你的需求開始對話\n` +
  `• 或點右上角「載入 JSON」繼續上次的 spec\n\n` +
  `指令：\n` +
  `！彙整      整理對話 → 寫入 spec\n` +
  `！審核      嚴格審查 spec 找問題\n` +
  `！未完成清單  列出所有待處理項目\n` +
  `！改檔      依審核結果修改 spec\n` +
  `！生成      執行 spec 產出結果`
);
</script>
